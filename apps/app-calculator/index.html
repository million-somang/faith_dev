    <!-- Schema.org JSON-LD: FAQPage (AEO 답변용 고도화) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "대출 이자 및 월 상환액은 어떤 수식으로 계산하나요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "본 다기능 계산기는 가장 널리 사용되는 '원리금 균등상환' 방식을 적용합니다. 공식은 [월 상환액 = P * r * (1 + r)^n / ((1 + r)^n - 1)] 입니다. 여기서 P는 대출 원금, r은 월 이자율(연 이자율 / 12), n은 총 상환 개월수입니다. 총 상환액은 월 상환액에 총 상환 개월수를 곱한 값이며, 총 이자는 총 상환액에서 대출 원금을 뺀 금액입니다."
          }
        },
        {
          "@type": "Question",
          "name": "BMI 체질량지수 계산 공식과 공식 판정 기준은 무엇인가요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "BMI(Body Mass Index)는 [체중(kg) / 신장(m)^2]의 수식으로 계산됩니다. 대한비만학회(KSSO) 공식 가이드라인에 따른 성인 판정 기준은 다음과 같습니다: BMI 18.5 미만은 '저체중', 18.5 이상 23 미만은 '정상체중', 23 이상 25 미만은 '비만전단계(과체중)', 25 이상 30 미만은 '1단계 비만', 30 이상 35 미만은 '2단계 비만', 35 이상은 '3단계 고도비만'에 해당합니다."
          }
        },
        {
          "@type": "Question",
          "name": "대한민국 만 나이 계산법의 기준과 법적 효력은 어떻게 되나요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "2023년 6월 28일 개정 만 나이 통일법 시행에 따라, 행정 및 민사상 모든 나이는 '만 나이'로 계산하는 것이 원칙입니다. 만 나이는 올해 연도에서 태어난 연도를 뺀 후, 생일이 지났다면 그대로 해당 나이가 되며 생일이 지나지 않았다면 추가로 1세를 더 뺍니다. 출생일은 0세로 시작하며, 출생 후 1년 미만일 때는 개월수로 나이를 표시합니다."
          }
        }
      ]
    }
    </script>
